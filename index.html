<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>🎮 سیستم مدیریت گیم‌نت نئونی</title>
  <style>
    @font-face {
      font-family: Vazirmatn;
      src: url("https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn/Vazirmatn-Regular.ttf");
    }

    body {
      font-family: Vazirmatn, sans-serif;
      background: radial-gradient(circle at top right, #1a1a2e, #0f0c29, #101010);
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      color: #fff;
      text-shadow: 0 0 10px #00e0ff, 0 0 20px #f00083;
      animation: glow 3s infinite alternate;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px #ff007f, 0 0 20px #00e0ff; }
      100% { text-shadow: 0 0 20px #00ffb3, 0 0 30px #ff007f; }
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(15, 15, 30, 0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
      padding: 25px;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .controls, .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 10px;
      justify-content: space-between;
    }

    select, input {
      background: rgba(0,0,0,0.4);
      color: #00e0ff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 10px;
      transition: all 0.3s;
      font-size: 0.9rem;
      text-align: center;
    }
    select:hover {
      transform: scale(1.03);
      border-color: #00e0ff;
      box-shadow: 0 0 10px #00e0ff;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
      position: relative;
      z-index: 1;
      overflow: hidden;
      color: white;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(45deg, #2196f3, #00e0ff);
      box-shadow: 0 0 10px #00e0ff;
    }
    .btn-primary:hover {
      box-shadow: 0 0 20px #00e0ff, 0 0 40px #ff009d;
      transform: scale(1.05);
    }

    .btn-secondary {
      background: linear-gradient(45deg, #ff4081, #f50057);
      box-shadow: 0 0 10px #ff4081;
    }
    .btn-secondary:hover {
      box-shadow: 0 0 25px #ff4081, 0 0 50px #00ff95;
      transform: scale(1.05);
    }

    .btn-warning {
      background: linear-gradient(45deg, #43a047, #00ffb3);
      box-shadow: 0 0 15px #00ffb3;
    }

    .summary-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      margin: 10px 0;
      border-top: 2px solid rgba(255,255,255,0.1);
      padding-top: 10px;
      color: #aaf3ff;
      animation: fadeIn 1.2s ease;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 10px;
      margin-top: 10px;
      box-shadow: 0 0 20px rgba(0,255,255,0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: #fff;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }

    th, td {
      padding: 10px 8px;
      text-align: center;
    }

    thead {
      background: linear-gradient(90deg, #4000ff 0%, #ff009d 100%);
    }

    tbody tr {
      transition: all 0.3s;
    }

    tbody tr:hover {
      background-color: rgba(0, 255, 255, 0.15);
      transform: scale(1.01);
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
    }

    .badge-mode { background: rgba(0,255,255,0.2); color: #00e0ff; }
    .badge-table { background: rgba(0,255,128,0.25); color: #4cff6b; }
    .badge-type-play { background: rgba(255,0,111,0.25); color: #ff0088; }
    .badge-type-reserve { background: rgba(255,255,0,0.25); color: #ffe055; }

    .delete-btn {
      background: #ff1744;
      padding: 5px 10px;
      border-radius: 5px;
    }
    .delete-btn:hover { background: #ff5252; }

    .close-btn {
      background: #00c853;
      padding: 5px 10px;
      border-radius: 5px;
      color: #fff;
    }
    .close-btn:hover {
      background: #69f0ae;
    }

    @keyframes neonPulse {
      0%,100% { box-shadow: 0 0 20px #00e0ff; }
      50% { box-shadow: 0 0 40px #ff007f; }
    }

    .container.active-pulse {
      animation: neonPulse 2.5s infinite alternate;
    }

  </style>
</head>
<body>
  <h1>🎮 سامانه مدیریت گیم‌نت نئونی</h1>
  <div class="container" id="mainContainer">
    <!-- کنترل‌ها -->
    <div class="controls">
      <select id="daySelect">
        <option>شنبه</option><option>یک‌شنبه</option><option>دوش‌شنبه</option>
        <option>سه‌شنبه</option><option>چهارشنبه</option><option>پنج‌شنبه</option><option>جمعه</option>
      </select>

      <select id="tableSelect"></select>
      <select id="timeSlotSelect"></select>

      <select id="modeSelect">
        <option value="2 دسته">۲ دسته (۱۰۰)</option>
        <option value="4 دسته">۴ دسته (۱۵۰)</option>
      </select>

      <select id="sessionTypeSelect">
        <option value="play">بازی</option>
        <option value="reserve">رزرو</option>
      </select>
    </div>

    <div class="buttons">
      <button class="btn-primary" onclick="addSession()">➕ ثبت</button>
      <button class="btn-secondary" onclick="clearDay()">🧹 پاک کردن روز</button>
      <button class="btn-warning" onclick="togglePulse()">🌈 موشن نئون</button>
    </div>

    <div class="summary-bar">
      <div>روز انتخاب‌شده: <span id="currentDay">شنبه</span></div>
      <div>درآمد روز: <span id="totalAmount">0</span> تومان</div>
      <div>تعداد رکورد: <span id="rowCount">0</span></div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th><th>نوع</th><th>میز</th><th>بازه</th><th>بازی</th><th>ساعت</th><th>مبلغ</th><th>عملیات</th>
          </tr>
        </thead>
        <tbody id="sessionsBody">
          <tr><td colspan="8">هنوز چیزی ثبت نشده.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const PRICE_2P = 100, PRICE_4P = 150;
    const DAYS = ["شنبه","یک‌شنبه","دوش‌شنبه","سه‌شنبه","چهارشنبه","پنج‌شنبه","جمعه"];
    const daySelect = document.getElementById("daySelect");
    const tableSelect = document.getElementById("tableSelect");
    const timeSlotSelect = document.getElementById("timeSlotSelect");
    const modeSelect = document.getElementById("modeSelect");
    const sessionTypeSelect = document.getElementById("sessionTypeSelect");
    const sessionsBody = document.getElementById("sessionsBody");
    const currentDay = document.getElementById("currentDay");
    const totalAmount = document.getElementById("totalAmount");
    const rowCount = document.getElementById("rowCount");
    const container = document.getElementById("mainContainer");

    const gameNet = {};
    DAYS.forEach(d=>gameNet[d]=[]);
    for (let i=1;i<=10;i++){
      const opt=document.createElement("option");
      opt.value=i;
      opt.textContent="میز "+i;
      tableSelect.appendChild(opt);
    }

    for(let h=8;h<24;h+=2){
      const o=document.createElement("option");
      o.value=`${h}-${h+2}`;
      o.textContent=`${h}:00 تا ${h+2}:00`;
      timeSlotSelect.appendChild(o);
    }

    function getPricePerHour(mode){
      return mode==="4 دسته"?PRICE_4P:PRICE_2P;
    }

    function addSession(){
      const day=daySelect.value;
      const table=+tableSelect.value;
      const [s,e]=timeSlotSelect.value.split("-").map(Number);
      const mode=modeSelect.value;
      const type=sessionTypeSelect.value;
      const arr=gameNet[day];
      if(arr.some(x=>x.table===table&&x.slotStart===s&&x.slotEnd===e)){
        alert("این میز در این بازه زمانی قبلاً ثبت شده.");
        return;
      }
      const hours=e-s;
      const amount=hours*getPricePerHour(mode);
      arr.push({table,slotStart:s,slotEnd:e,mode,type,hours,amount});
      render();
      neonFlash();
    }

    function deleteSession(i){
      const day=daySelect.value;
      gameNet[day].splice(i,1);
      render();
    }

    function closeSession(i){
      const day=daySelect.value;
      alert(`سشن شماره ${i+1} بسته شد ✅`);
    }

    function render(){
      const day=daySelect.value;
      const list=gameNet[day];
      currentDay.textContent=day;
      sessionsBody.innerHTML="";
      let total=0;
      if(!list.length){
        sessionsBody.innerHTML='<tr><td colspan="8">هنوز چیزی ثبت نشده</td></tr>';
      }else{
        list.forEach((x,i)=>{
          total+=x.amount;
          sessionsBody.innerHTML += `
            <tr>
              <td>${i+1}</td>
              <td><span class="badge ${x.type==='play'?'badge-type-play':'badge-type-reserve'}">${x.type==='play'?'بازی':'رزرو'}</span></td>
              <td><span class="badge badge-table">میز ${x.table}</span></td>
              <td>${x.slotStart}:00 تا ${x.slotEnd}:00</td>
              <td><span class="badge badge-mode">${x.mode}</span></td>
              <td>${x.hours}</td>
              <td>${x.amount}</td>
              <td>
                <button class="close-btn" onclick="closeSession(${i})">بستن</button>
                <button class="delete-btn" onclick="deleteSession(${i})">حذف</button>
              </td>
            </tr>`;
        });
      }
      totalAmount.textContent=total;
      rowCount.textContent=list.length;
    }

    daySelect.onchange=render;

    function clearDay(){
      const day=daySelect.value;
      if(confirm("پاک شود؟")){
        gameNet[day]=[];
        render();
      }
    }

    function togglePulse(){
      container.classList.toggle("active-pulse");
    }

    // افکت فلش لحظه‌ای بعد از ثبت
    function neonFlash(){
      container.style.boxShadow="0 0 50px #ff007f";
      setTimeout(()=>container.style.boxShadow="0 0 25px rgba(0,255,255,0.2)",600);
    }

    render();
  </script>
</body>
</html>
