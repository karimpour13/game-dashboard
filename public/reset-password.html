<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>تعیین رمز جدید</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: var(--bg-color);
      }
      .glass-login-box {
        max-width: 400px;
        margin: auto;
        background: var(--panel-bg);
        padding: 30px;
        border-radius: 20px;
        text-align: center;
      }
      .input-group {
        margin-bottom: 15px;
        text-align: right;
      }
      .input-group input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(150, 150, 150, 0.3);
        background: var(--input-bg);
        color: var(--text-main);
      }
      .btn-login {
        background: var(--primary);
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 40px;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }
      #resetMessage {
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="glass-login-box">
      <h2>تعیین رمز عبور جدید</h2>
      <div class="input-group">
        <label>رمز عبور جدید</label>
        <input type="password" id="newPassword" placeholder="********" />
      </div>
      <div class="input-group">
        <label>تکرار رمز عبور</label>
        <input type="password" id="confirmPassword" placeholder="********" />
      </div>
      <button id="resetPasswordBtn" class="btn-login">تغییر رمز</button>
      <div id="resetMessage"></div>
    </div>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      document
        .getElementById('resetPasswordBtn')
        .addEventListener('click', async () => {
          const newPassword = document.getElementById('newPassword').value;
          const confirm = document.getElementById('confirmPassword').value;
          if (!newPassword || !confirm) {
            document.getElementById('resetMessage').innerHTML =
              '<span style="color: red;">لطفاً هر دو فیلد را پر کنید</span>';
            return;
          }
          if (newPassword !== confirm) {
            document.getElementById('resetMessage').innerHTML =
              '<span style="color: red;">رمزها مطابقت ندارند</span>';
            return;
          }
          try {
            const res = await fetch('/api/v1/auth/reset-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token, newPassword }),
            });
            const data = await res.json();
            if (res.ok) {
              document.getElementById('resetMessage').innerHTML =
                '<span style="color: green;">رمز با موفقیت تغییر کرد. به صفحه لاگین می‌روید...</span>';
              setTimeout(() => {
                window.location.href = '/';
              }, 2000);
            } else {
              document.getElementById('resetMessage').innerHTML =
                '<span style="color: red;">' +
                (data.message || 'خطا') +
                '</span>';
            }
          } catch (err) {
            document.getElementById('resetMessage').innerHTML =
              '<span style="color: red;">خطا در ارتباط با سرور</span>';
          }
        });
    </script>
  </body>
</html>
